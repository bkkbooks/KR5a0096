front:
  text: 洞玄靈寶无量度人經訣音義秋七
  hash: sha256:f08c800af94806a8f507c406f002733d73f1a38f16004bff3f20503d6c3a269e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0096_SJB_000-020527a, image: sjb/02/020527a.png}
body:
  text: 張萬福纂凡持太上洞玄靈寳无量十部尊經東向前三禮北向立左轉東向叩齒三十六通思五色雲氣覆滿一室青龍白虎師子玄武朱雀鳳凰備守前後玉女仙童五帝神官神仙兵馬九億萬衆營衛左右便摇身三過而誦經竟當從南面下牀禮如初右出金籙簡文經凡開靈藴誦經之時皆當燒香整具法服禮經如法誦呪曰寂寂至无宗虚峙劫刃阿豁落洞玄文誰測此幽遐一入大乘路孰計年劫多不生亦不滅欲生因蓮華超淩三界徒慈心解世羅眞人无上德世世爲仙家右出太極寳訣持生神章經亦同此上呪及法太上洞玄靈寳无量度人上品妙經者斯乃人法雙舉總别俱舍太上一代之法王道君宣經之化主洞玄靈寳是十部之總題无量度人爲一軸之别目太者極大之嘉名上者窮高之美稱窮高則居上无頂極大則物莫能過欲明聖人體貴德尊窮理盡妙轉迴靡測難可思議故云太上洞者虚通不滯豁達无爲營覽清遥顯暢遐徹玄者沖微邃遠妙寂湛然理致杳㝠幽原眇邈靈者精用朗淨智照圓明將應變盡性之宜實慧周萬機之境寳者珍奇挺秀尊貴加榮布象則天地成形貸炁則含生化育无量度人者无是不有之目量是數極之名度以濟彼爲言人以物類成稱斯乃濟度天人極无數量凡厥昇進俱入妙門成就有心使歸无相上品妙經者此經始於无始最爲先說衆品之内標之其上元宗常湛故曰妙經尋斯㫖趣義含无量就明无量自有五意一者體无量二者德无量三者威无量四者品无量五者音无量體无量者但天尊宗源乆遠本自難知或眞應兩身權實二智是以託名龍漢即曰无形設號開皇乃稱元始隨機設教逐病與藥周應不窮无乎不在此第一體无量也德无量者體處元陽恬神靜漠口含五色光照大千能使受法珠中聞經太上此第二德无量也威无量者聖人懷藏日月推定陰陽迴山駐流調和炁序千千截首制伏祅魔萬萬翦形邪不擾正此第三威无量也品无量者若論凡物皆有品第即有高下少多之目今明聖人應物隨縁非高非下赴機逐便不少不多難可以高下格量无能以少多所得是以无品品則无量此第四品无量也音无量者明聖人以无言之說則不窮无聲之響響則无絶使歷劫解悟人天曉聞故云大梵隱語无量之音又云天中之音斯之謂也此第五音无量也略陳梗概其意云爾右出洞元靈寳十部經序四極明科曰凡誦經當令心目相應目无妄視心无異念每使披卷言句周竟不得中住越略天音三犯萬不得仙五犯已上死充地獄三塗五苦萬劫之中隱注曰讀經五百言則叩齒三下以舌舐上下脣咽液三過令人不極乆而聲清不如此法損氣勞神也右出洞玄靈寳齋内事心業序人間多讀誦洞玄靈寶无量度人經雖有祝想之訣而罕解節度今復具言庶可得知自題以下降元始正經既是道君叙贊宜依洞玄十部存念内音自須依本法今具列之如左讀至道言次依下文存思祝誦臣及甲乙若自爲不宜云及爲人不宜云臣心不兼二故也若爲己及人宜依本文畢引炁三十二過須徐徐引取三十二天之炁然後依法誦之此正是元始无量度人存念法也行道章叩齒三十二通上聞三十二天心拜三十二過須一一依口密誦天名心聞諸天一一心拜心拜形雖不動隨心屈伏如身禮也皆先習精熟知天所在无令臨事致碍遲迴不决凡存念祝誦悉皆如此也太黄皇曾天太明玉完天清明何童天元胎平育天元明文舉天七曜摩夷天虚无越衡天太極濛翳天右八天位係東方九炁青天從北頭爲始南行也赤明和陽天元明恭華天曜明宗飄天竺落皇笳天虚明堂曜天觀明端靜天元明恭慶天太焕極瑶天右八天位係炁丹天炁東頭西起行元载孔昇天太安皇崖天顯定極风天始皇孝芒天太黄翁重天无思江由天上揲阮樂天无極曇誓天右八天位係西方七炁素天從南頭爲始北行皓庭霄度天淵通元洞天翰寵妙成天秀樂禁上天无上常融天玉隆騰勝天龍變梵度天平育賈奕天右八天位係北方五炁玄天從西頭始東行誦諸天内音存念法東亶婁六十四字存念法叩齒九通思九色之龍導引前後青雲九重覆匝身形呪曰赤明開圖八炁迴眞總統元關青帝大神流化九外纏綿我身靈音八書六十四篇洞明天地與我合仙運致龍駕上昇帝轅呪畢引炁九咽止行之九年八天各以青腰玉女青華玉童各八人侍衛身形致青牙之精生身光明徹見虚无萬遍道成即得飛行七祖同福皆昇南宫也南南爓六十四宇存念法叩齒三通思朱雀鳳凰翺翔其前絳雲三重覆匝身形密呪曰三炁徘徊靈鳳來飛玉音八字爓焕紫微吉日大慶我道洞開朱丹哺飴仰吸靈暉身生水火絳帔羽衣登空飛步足踐鳳梯周旋八天七祖相隨呪畢引炁三咽止行之三年八天各以太丹玉女太陽玉童各八人侍衛身形降致朱丹三炁之精反白留容萬劫不傾七祖超昇上入福堂反胎王家即得更生西刀利六十四字存念法叩齒七通思白虎師子導引左右素雲七重覆匝身形密呪曰七炁金靈八天尊神白虎策輦師子捧轅七炁纏綿鍊我成仙身登金光映照素雲内外變化昇入洞門七祖出夜九幽旋魂億劫開度隨運長存呪畢引炁七咽止行之七年八天各以素靈玉童八人侍衛身形降致太素七炁之精停年留貌萬劫童顔慶及七祖昇度南宫反胎更生世世王門北玃无六十四宇存念法叩齒五通思飛龍羽蓋蓊鬱左右黑雲五重覆匝身形神童玉女羽衣飛裳侍衛前後密呪曰元天徘徊流景上清大有啓運八字高明飛元澄空洞陰自生五炁纏綿灌我身形冠帶北單受鍊洞靈腎府北出内外光精飛行三界遊宴紫庭七祖同慶歡樂劫齡七寳林中反胎更生長夜出離南宫記名黄籙白簡世世生仙呪畢引炁五咽止行之五年八天各以太元玉童各八人侍衛身形降致靈滋五炁之精還年留景保命三清慶及七祖世世生仙右出靈寳玉字經凡持此度人經六度存念祝誦法具件如前音義道言太上道君爲此經序故皆云道言也始青天中東北之天是也浮黎土音杜量良去无鞅於仰切天圍限也鬱勃如字瘖音因疾不言陰之謂也跛博我切足疾也痾音乆疾阿也痼音沈困乆故遠之貌返府遠切勃勃音拂廓散思幹切監度上音緘粗悉徂沽切倏音叔欻許物切中傷中去憎子能切𡜍音忌經始出教或云元始出教誤也藏似郞切璿機上旋下機北斗魁四星是也不行音衡屍或作尸死喪息依切威未制天句絶億曾音憎上常去尸解肯託形隱化内賈身成仙也長役營隻切斷地徒管切長爲干僞切爲帝王音正月位同蓊冥烏孔切使者師事切大梵日月之上八天也眇眇劫刃眇茫也三華平聲離便方便之便森所岑切淨霐音泓大行音衡度戹音厄驂音參監眞音緘應度音響鬱繿音藍恬懀上音甜下烏外切皇笳音加宛黎上於遠切下力低切阮樂音岳勃悖音沛曇音潭秀樂音洛總監音鑒行元下孟切今日欣慶受度句擔石多甘切鼓從詞用切遊觀音貫咸聽音汀涬胡頂切使天音史一十五分扶問切上聞諸天或云關字誤也斬馘古伯切去耳之刑樂兮音洛下同過之古卧切别眞彼月切懈退古隘切雲嶒音層易邪以致切不樂五教切得過音戈舊格或云其格誤也否終音彼烋音休盛大貌凡有此災同氣句爲音位毫分符問切亶丹上薈烏外切惒胡卧切觀音音貫迴蹠音隻南爓音艷詵詵嚴公註云洗洗推前音吹澤洛上鐸下郝縁邅陟連切蕭嵎音愚易邈音亦玃居縛切東覆方茂切總監音鑒不辟音壁大量玄玄云无量者誤也此經太上大道君受之於元始天尊傳教於世道君爲前序後序中序凡有三序焉前序自道言昔於至東向誦經是也中序自三界之歌章之後此二章並是至洞明至言也是也後序自此諸天中至大量玄玄也是也經有二章自元始洞玄至列言上清且後章自元洞玉曆訖禍及七祖翁是也其大梵隱語非其二章之數或以經爲章隱爲二章此亦誤矣中序云誦經萬徧乃能得道洞明至言此則隱語玄奥不在經文二章之列可知矣讀誦之士當心信无疑功滿道備自當洞曉人天同福存殁沾恩可不志哉可不勉哉玄門靈驗記道門集驗記持此經得驗記皆有傳載通真之士勤而行之洞玄靈寳無量度人經訣音義

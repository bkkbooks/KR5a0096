front:
  text: 洞玄靈寶無量度人經訣音義秋七
  hash: sha256:645a6b153e4f637d785d65c287c7d3c8ff8ddb911b823685d0e479ce62c5d5ea
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0096_HFL_000-001a, image: hfl/0048/0048-178.png}
body:
  text: 張萬福纂凡持太上洞玄靈寶無量十部尊經東向前三禮北向立左轉東向叩齒三十六通思五色雲氣覆滿一室青龍白虎師子玄武朱雀鳳凰備守前後玉女仙童五帝神官神仙兵馬九億萬衆營衛左右便搖身三過而誦經竟當從南面下牀禮如初右出金籙簡文經凡開靈藴誦經之時皆當燒香整具法服禮經如法誦呪曰寂寂至無宗虛峙劫刃阿豁落洞玄文誰測此幽遐一入大乘路孰計年劫多不生亦不滅欲生因蓮華超淩三界徒慈心解世羅真人無上德世世為仙家右出太極寶訣持生神章經亦同此上呪及法太上洞玄靈寶無量度人上品妙經者斯乃人法雙舉總别俱舍太上一代之法王道君宣經之化主洞玄靈寶是十部之總題無量度人為一軸之别目太者極大之嘉名上者窮高之美稱窮高則居上無頂極大則物莫能過欲明聖人體貴德尊窮理盡妙轉回靡測難可思議故云太上洞者虛通不滯豁達無為營覽清遙顯暢遐徹玄者沖微邃遠妙寂湛然理致杳冥幽原眇邈靈者精用朗淨智照圓明將應變盡性之宜實慧周萬機之境寶者珍奇挺秀尊貴加榮布象則天地成形貸氣則含生化育無量度人者無是不有之目量是數極之名度以濟彼為言人以物類成稱斯乃濟度天人極無數量凡厥升進俱入妙門成就有心使歸無相上品妙經者此經始於無始最為先說衆品之內標之其上元宗常湛故曰妙經尋斯㫖趣義含無量就明無量自有五意一者體無量二者德無量三者威無量四者品無量五者音無量體無量者但天尊宗源久遠本自難知或真應兩身權實二智是以託名龍漢即曰無形設號開皇乃稱元始隨機設教逐病與藥周應不窮無乎不在此第一體無量也德無量者體處元陽恬神靜漠口含五色光照大千能使受法珠中聞經太上此第二德無量也威無量者聖人懷藏日月推定陰陽回山駐流調和氣序千千截首制伏祅魔萬萬翦形邪不擾正此第三威無量也品無量者若論凡物皆有品第即有高下少多之目今明聖人應物隨緣非高非下赴機逐便不少不多難可以高下格量無能以少多所得是以無品品則無量此第四品無量也音無量者明聖人以無言之說則不窮無聲之響響則無絶使歷劫解悟人天曉聞故云大梵隱語無量之音又云天中之音斯之謂也此第五音無量也略陳梗概其意云爾右出洞元靈寶十部經序四極明科曰凡誦經當令心目相應目無妄視心無異念每使披卷言句周竟不得中住越略天音三犯萬不得仙五犯已上死充地獄三塗五苦萬劫之中隱注曰讀經五百言則叩齒三下以舌舐上下脣咽液三過令人不極久而聲清不如此法損氣勞神也右出洞玄靈寶齊內事心業序人間多讀誦洞玄靈寶無量度人經雖有祝想之訣而罕解節度今復具言庶可得知自題以下降元始正經既是道君叙贊宜依洞玄十部存念內音自須依本法今具列之如左讀至道言次依下文存思祝誦臣及甲乙若自為不宜云及為人不宜云臣心不兼二故也若為己及人宜依本文畢引氣三十二過須徐徐引取三十二天之氣然後依法誦之此正是元始無量度人存念法也行道章叩齒三十二通上聞三十二天心拜三十二過須一一依口密誦天名心聞諸天一一心拜心拜形雖不動隨心屈伏如身禮也皆先習精熟知天所在無令臨事致礙遲回不决凡存念祝誦悉皆如此也太黃皇曾天太明玉完天清明何童天元胎平育天元明文舉天七曜摩夷天虛無越衡天太極濛翳天右八天位係東方九氣青天從北頭為始南行也赤明和陽天元明恭華天曜明宗飄天竺落皇笳天虛明堂曜天觀明端靜天元明恭慶天太焕極瑶天右八天位係氣丹天氣東頭西起行元載孔升天太安皇崖天顯定極風天始皇孝芒天太黃翁重天無思江由天上揲阮樂天無極曇誓天右八天位係西方七氣素天從南頭為始北行皓庭霄度天淵通元洞天翰寵妙成天秀樂禁上天無上常融天玉隆騰勝天龍變梵度天平育賈奕天右八天位係北方五氣玄天從西頭始東行誦諸天內音存念法東亶婁六十四字存念法叩齒九通思九色之龍導引前後青雲九重覆匝身形呪曰赤明開圖八氣回真總統元關青帝大神流化九外纏綿我身靈音八書六十四篇洞明天地與我合仙運致龍駕上升帝轅呪畢引氣九咽止行之九年八天各以青腰玉女青華玉童各八人侍衛身形致青牙之精生身光明徹見虛無萬遍道成即得飛行七祖同福皆升南宫也南南爓六十四宇存念法叩齒三通思朱雀鳳凰翺翔其前絳雲三重覆匝身形密呪曰三氣徘徊靈鳳來飛玉音八字爓焕紫微吉日大慶我道洞開朱丹哺飴仰吸靈暉身生水火絳帔羽衣登空飛步足踐鳳梯周旋八天七祖相隨呪畢引氣三咽止行之三年八天各以太丹玉女太陽玉童各八人侍衛身形降致朱丹三氣之精反白留容萬劫不傾七祖超升上入福堂反胎王家即得更生西刀利六十四字存念法叩齒七通思白虎師子導引左右素雲七重覆匝身形密呪曰七氣金靈八天尊神白虎策輦師子捧轅七氣纏綿鍊我成仙身登金光映照素雲內外變化升入洞門七祖出夜九幽旋魂億劫開度隨運長存呪畢引氣七咽止行之七年八天各以素靈玉童八人侍衛身形降致太素七氣之精停年留貌萬劫童顔慶及七祖升度南宫反胎更生世世王門北玃無六十四宇存念法叩齒五通思飛龍羽蓋蓊鬱左右黑雲五重覆匝身形神童玉女羽衣飛裳侍衛前後密呪曰元天徘徊流景上清大有啓運八字高明飛元澄空洞陰自生五氣纏綿灌我身形冠帶北單受鍊洞靈腎府北出內外光精飛行三界遊宴紫庭七祖同慶歡樂劫齡七寶林中反胎更生長夜出離南宫記名黃籙白簡世世生仙呪畢引氣五咽止行之五年八天各以太元玉童各八人侍衛身形降致靈滋五氣之精還年留景保命三清慶及七祖世世生仙右出靈寶玉字經凡持此度人經六度存念祝誦法具件如前音義道言太上道君為此經序故皆云道言也始青天中東北之天是也浮黎土音杜量良去無鞅於仰切天圍限也鬱勃如字瘖音因疾不言陰之謂也跛博我切足疾也痾音久疾阿也痼音沈困久故遠之貌返府遠切勃勃音拂廓散思幹切監度上音緘粗悉徂沽切倏音叔欻許物切中傷中去憎子能切𡜍音忌經始出教或云元始出教誤也藏似郎切璿機上旋下機北斗魁四星是也不行音衡尸或作尸死喪息依切威未制天句絶億曾音憎上常去尸解肯託形隱化內賈身成仙也長役營隻切斷地徒管切長為干僞切為帝王音正月位同蓊冥烏孔切使者師事切大梵日月之上八天也眇眇劫刃眇茫也三華平聲離便方便之便森所岑切淨霐音泓大行音衡度厄音厄驂音參監真音緘應度音響鬱繿音藍恬懀上音甜下烏外切皇笳音加宛黎上於遠切下力低切阮樂音嶽勃悖音沛曇音潭秀樂音洛總監音鑒行元下孟切今日欣慶受度句擔石多甘切鼓從詞用切遊觀音貫咸聽音汀涬胡頂切使天音史一十五分扶問切上聞諸天或云關字誤也斬馘古伯切去耳之刑樂兮音洛下同過之古卧切别真彼月切懈退古隘切雲嶒音層易邪以致切不樂五教切得過音戈舊格或云其格誤也否終音彼烋音休盛大貌凡有此災同氣句為音位毫分符問切亶丹上薈烏外切惒胡卧切觀音音貫回跖音隻南爓音艷詵詵嚴公注云洗洗推前音吹澤洛上鐸下郝緣邅陟連切蕭嵎音愚易邈音亦玃居縛切東覆方茂切總監音鑒不辟音壁大量玄玄云無量者誤也此經太上大道君受之於元始天尊傳教於世道君為前序後序中序凡有三序焉前序自道言昔於至東向誦經是也中序自三界之歌章之後此二章並是至洞明至言也是也後序自此諸天中至大量玄玄也是也經有二章自元始洞玄至列言上清且後章自元洞玉曆訖禍及七祖翁是也其大梵隱語非其二章之數或以經為章隱為二章此亦誤矣中序云誦經萬遍乃能得道洞明至言此則隱語玄奧不在經文二章之列可知矣讀誦之士當心信無疑功滿道備自當洞曉人天同福存殁沾恩可不志哉可不勉哉玄門靈驗記道門集驗記持此經得驗記皆有傳載通真之士勤而行之洞玄靈寶無量度人經訣音義
